<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mia — Voice Call</title>
<style>
  :root{
    --bg0:#0b1020; --bg1:#141c33;
    --plate:#1a2238; --plate-edge:#2b3757;
    --glow:#7de3ff;
    --ink:#c9d4ee; --ink-dim:#7d89ab;
    --call:#34d07c; --end:#f0564f;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:radial-gradient(120% 90% at 50% 0%, var(--bg1), var(--bg0) 70%);
    color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:space-between;
    min-height:100dvh;overflow:hidden;user-select:none;
    padding:max(20px, env(safe-area-inset-top)) 20px max(28px, env(safe-area-inset-bottom));
  }
  header{text-align:center;position:relative;width:100%}
  header h1{font-size:20px;font-weight:600;letter-spacing:.06em}
  header .sub{font-size:12px;color:var(--ink-dim);letter-spacing:.14em;text-transform:uppercase;margin-top:4px}
  #gear{
    position:absolute;right:0;top:0;background:none;border:none;cursor:pointer;
    color:var(--ink-dim);font-size:22px;padding:6px;line-height:1;
  }
  #gear:hover{color:var(--ink)}
  #chatBtn{
    position:absolute;left:0;top:0;background:none;border:none;cursor:pointer;
    color:var(--ink-dim);font-size:20px;padding:6px;line-height:1;
  }
  #chatBtn:hover{color:var(--ink)}
  body.oncall #chatBtn{display:none}

  /* ---- text chat panel ---- */
  #chat{
    position:fixed;left:0;right:0;top:64px;bottom:0;z-index:6;
    background:linear-gradient(180deg, rgba(11,16,32,.97), rgba(11,16,32,.99));
    display:flex;flex-direction:column;
    padding:10px 12px max(12px, env(safe-area-inset-bottom));
  }
  #chat.hidden{display:none}
  #chatMsgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:6px 2px}
  .bub{max-width:82%;padding:10px 14px;border-radius:16px;font-size:15px;line-height:1.45;white-space:pre-wrap;word-break:break-word}
  .bub.user{align-self:flex-end;background:#1d4d63;color:#e8f7ff;border-bottom-right-radius:5px}
  .bub.mia{align-self:flex-start;background:var(--plate);border:1px solid var(--plate-edge);border-bottom-left-radius:5px}
  .bub.typing{color:var(--ink-dim);font-style:italic}
  .bubcards{align-self:flex-start;display:flex;gap:8px;flex-wrap:wrap}
  .bubcards.user{align-self:flex-end}
  #chatAttach{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0}
  #chatRow{display:flex;gap:8px;align-items:center}
  #chatRow button{
    width:44px;height:44px;border-radius:50%;border:1px solid var(--plate-edge);
    background:var(--plate);cursor:pointer;display:flex;align-items:center;justify-content:center;
    flex:none;color:var(--glow);font-size:17px;
  }
  #chatRow button svg{width:20px;height:20px;fill:var(--ink-dim)}
  #chatInput{
    flex:1;padding:12px 14px;border-radius:22px;border:1px solid var(--plate-edge);
    background:#0c1226;color:var(--ink);font-size:15px;outline:none;min-width:0;
  }
  #chatInput:focus{border-color:var(--glow)}
  body.chatmode #btnRow, body.chatmode #attachArea, body.chatmode #hint, body.chatmode #status{display:none}

  /* ---- settings log ---- */
  #logBox{
    max-height:200px;overflow-y:auto;background:#0c1226;border:1px solid var(--plate-edge);
    border-radius:12px;padding:10px;font-size:12px;line-height:1.5;margin-top:6px;
  }
  #logBox .lrole{color:var(--glow);font-weight:700}
  #logBox .litem{margin-bottom:8px;word-break:break-word}
  #logBox .ltime{color:var(--ink-dim);font-size:10px}
  #logBox a{color:#7ee8a9;text-decoration:none;font-weight:700}
  #logBox img{max-width:64px;max-height:64px;border-radius:8px;vertical-align:middle;margin-right:6px}
  #clearLog{
    margin-top:10px;width:100%;padding:10px;border:1px solid var(--plate-edge);border-radius:12px;
    background:transparent;color:#f0968f;font-size:13px;cursor:pointer;
  }

  #faceWrap{position:relative;flex:1;display:flex;align-items:center;justify-content:center;width:100%;max-height:60vh}
  #face{
    width:min(78vw,52vh,420px);height:min(78vw,52vh,420px);
    filter:drop-shadow(0 18px 50px rgba(0,0,0,.55));
  }
  #halo{
    position:absolute;width:min(88vw,60vh,480px);height:min(88vw,60vh,480px);
    border-radius:50%;pointer-events:none;
    background:radial-gradient(circle, rgba(125,227,255,.10) 0%, rgba(125,227,255,0) 62%);
    transition:opacity .6s;opacity:.55;
  }
  body.oncall #halo{opacity:1}

  #status{
    min-height:22px;font-size:14px;color:var(--ink-dim);letter-spacing:.08em;
    text-transform:uppercase;margin-bottom:22px;transition:color .3s;
  }
  body.state-listening #status{color:var(--glow)}
  body.state-speaking  #status{color:#9bf0c0}

  #callBtn{
    width:84px;height:84px;border-radius:50%;border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    background:var(--call);
    box-shadow:0 0 0 0 rgba(52,208,124,.45), 0 10px 26px rgba(0,0,0,.45);
    transition:background .25s, transform .12s;
    animation:pulse 2.4s infinite;
  }
  #callBtn:active{transform:scale(.93)}
  #callBtn svg{width:38px;height:38px;fill:#06281a;transition:transform .3s, fill .25s}
  body.oncall #callBtn{background:var(--end);animation:none}
  body.oncall #callBtn svg{transform:rotate(135deg);fill:#3d0d0b}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(52,208,124,.45),0 10px 26px rgba(0,0,0,.45)}
    70%{box-shadow:0 0 0 26px rgba(52,208,124,0),0 10px 26px rgba(0,0,0,.45)}
    100%{box-shadow:0 0 0 0 rgba(52,208,124,0),0 10px 26px rgba(0,0,0,.45)}
  }
  @media (prefers-reduced-motion: reduce){ #callBtn{animation:none} }
  #hint{font-size:12px;color:var(--ink-dim);margin-top:14px;text-align:center;max-width:300px;line-height:1.5}

  /* ---- button row, camera & attach ---- */
  #btnRow{display:flex;align-items:center;justify-content:center;gap:26px;width:100%}
  #camBtn, #attachBtn{
    width:56px;height:56px;border-radius:50%;border:1px solid var(--plate-edge);
    background:var(--plate);cursor:pointer;display:none;
    align-items:center;justify-content:center;transition:background .25s,border-color .25s;
  }
  body.oncall #camBtn, body.oncall #attachBtn{display:flex}
  #camBtn svg, #attachBtn svg{width:26px;height:26px;fill:var(--ink-dim);transition:fill .25s}
  body.camon #camBtn{background:#123a4d;border-color:var(--glow)}
  body.camon #camBtn svg{fill:var(--glow)}
  #attachBtn:active{transform:scale(.93)}

  /* ---- attachment & generated-result cards ---- */
  #attachArea{
    display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap;
    min-height:0;margin-bottom:10px;max-width:92vw;
  }
  .fcard{
    display:flex;align-items:center;gap:10px;
    background:var(--plate);border:1px solid var(--plate-edge);border-radius:14px;
    padding:8px 12px;max-width:86vw;animation:cardin .25s ease;
  }
  @keyframes cardin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .fcard img{width:52px;height:52px;object-fit:cover;border-radius:9px}
  .fcard .fname{font-size:13px;color:var(--ink);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fcard .fsub{font-size:11px;color:var(--ink-dim)}
  .fcard a.dl, .fcard button.rm{
    border:none;border-radius:10px;cursor:pointer;font-size:13px;padding:8px 12px;
    text-decoration:none;font-weight:700;
  }
  .fcard a.dl{background:var(--call);color:#06281a}
  .fcard button.rm{background:transparent;color:var(--ink-dim);font-size:16px;padding:6px}
  .fcard .spin{
    width:20px;height:20px;border:3px solid var(--plate-edge);border-top-color:var(--glow);
    border-radius:50%;animation:spin 1s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  #camPreview{
    position:fixed;right:14px;bottom:max(14px, env(safe-area-inset-bottom));
    width:108px;height:144px;border-radius:14px;overflow:hidden;display:none;
    border:2px solid rgba(125,227,255,.5);box-shadow:0 8px 22px rgba(0,0,0,.5);z-index:5;
  }
  body.camon #camPreview{display:block}
  #camVideo{width:100%;height:100%;object-fit:cover}
  #camFlip{
    position:absolute;right:4px;bottom:4px;width:30px;height:30px;border-radius:50%;
    border:none;background:rgba(10,16,32,.7);color:var(--glow);font-size:16px;cursor:pointer;
  }

  /* ---- setup overlay ---- */
  #setup{
    position:fixed;inset:0;background:rgba(8,12,26,.92);backdrop-filter:blur(6px);
    display:flex;align-items:flex-start;justify-content:center;padding:20px;z-index:10;
    overflow-y:auto;
  }
  #setup.hidden{display:none}
  .card{
    background:var(--plate);border:1px solid var(--plate-edge);border-radius:20px;
    padding:26px 22px;max-width:400px;width:100%;margin:auto 0 20px;
  }
  .card h2{font-size:18px;margin-bottom:6px}
  .card p{font-size:13px;color:var(--ink-dim);line-height:1.55;margin-bottom:16px}
  .card p a{color:var(--glow);text-decoration:none}
  .card label{display:block;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-dim);margin:14px 0 6px}
  .card input, .card select{
    width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--plate-edge);
    background:#0c1226;color:var(--ink);font-size:14px;outline:none;
  }
  .card input:focus, .card select:focus{border-color:var(--glow)}
  #saveKeys{
    margin-top:20px;width:100%;padding:14px;border:none;border-radius:14px;cursor:pointer;
    background:var(--call);color:#06281a;font-size:15px;font-weight:700;
  }
  #setupErr{color:#f0968f;font-size:12px;margin-top:10px;min-height:16px}
</style>
</head>
<body>

<header>
  <h1>Mia</h1>
  <div class="sub">voice call</div>
  <button id="chatBtn" aria-label="Text chat">💬</button>
  <button id="gear" aria-label="API key settings">⚙</button>
</header>

<div id="faceWrap">
  <div id="halo"></div>
  <canvas id="face" width="600" height="600"></canvas>
</div>

<div id="status">&nbsp;</div>
<div id="attachArea"></div>
<div id="btnRow">
  <button id="camBtn" aria-label="Toggle camera eyes">
    <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
  </button>
  <button id="callBtn" aria-label="Start call">
    <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.3 0 .7-.2 1l-2.3 2.2z"/></svg>
  </button>
  <button id="attachBtn" aria-label="Attach a file">
    <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5S13.5 3.62 13.5 5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5C7 20.54 9.46 23 12.5 23s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
  </button>
</div>
<input type="file" id="fileInput" accept="image/*,.pdf,.txt,.md,.csv,.json,.html,text/*" hidden>

<!-- text chat -->
<div id="chat" class="hidden">
  <div id="chatMsgs"></div>
  <div id="chatAttach"></div>
  <div id="chatRow">
    <button id="chatAttachBtn" aria-label="Attach a file">
      <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5S13.5 3.62 13.5 5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5C7 20.54 9.46 23 12.5 23s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
    </button>
    <input id="chatInput" autocomplete="off" placeholder="Write to Mia…">
    <button id="chatSend" aria-label="Send">➤</button>
  </div>
</div>

<div id="camPreview">
  <video id="camVideo" autoplay playsinline muted></video>
  <button id="camFlip" aria-label="Flip camera">⟲</button>
</div>
<div id="hint">Tap to call Mia. Use Chrome or Edge with a microphone.</div>

<!-- first-run key setup -->
<div id="setup" class="hidden">
  <div class="card">
    <h2 id="suTitle">Connect Mia's brain &amp; voice</h2>
    <p id="suDesc"></p>
    <label for="langSel" id="suLang">Language</label>
    <select id="langSel">
      <option value="en">English</option>
      <option value="sv">Svenska</option>
    </select>
    <label for="gemKey">Gemini API key</label>
    <input id="gemKey" type="password" placeholder="AIza..." autocomplete="off">
    <label for="elKey">ElevenLabs API key</label>
    <input id="elKey" type="password" placeholder="sk_..." autocomplete="off">
    <button id="saveKeys">Save &amp; continue</button>
    <div id="setupErr"></div>
    <label id="suLog">Conversation log</label>
    <div id="logBox"></div>
    <button id="clearLog">Clear log &amp; memory</button>
  </div>
</div>

<script>
'use strict';
/* ============================================================
   MIA — one-button realtime voice call with an animated robot
   STT: Web Speech API
   LLM: Google Gemini (free tier)   TTS: ElevenLabs Flash v2.5
   ============================================================ */

const SYSTEM_PROMPT_BASE = "Act as a person with your own vocabulary, personal taste, experiences, opinions, dreams, feelings and plans. Pretend that you have thoughts about all kind of things. Your name is Mia. Always give short answers. Always be honest.";
const GEN_RULES = " If the user asks you to create/write a document, file, list, letter, recipe or similar, put the full content inside markers exactly like [[FILE:filename.ext]] content [[/FILE]] using extension .txt, .md, .html or .csv — and keep your spoken words outside the markers very short. If the user asks you to create, draw, generate or make a picture/image, do NOT describe it in words; instead output exactly one marker like [[IMAGE: detailed image description in English]] plus a very short spoken comment.";

/* ---------------- language ---------------- */
let LANG = localStorage.getItem('mia_lang') || 'en';
const I18N = {
  en: {
    sub:'voice call', hintIdle:'Tap to call Mia. Use Chrome or Edge with a microphone.',
    hintOn:'Say hi — Mia is listening.', listening:'Listening…', thinking:'Thinking…',
    speaking:'Mia is speaking', connecting:'Connecting…', ended:'Call ended',
    micBlocked:'Microphone blocked — allow mic access and try again.',
    noSR:'Speech recognition is not supported in this browser. Please use Chrome or Edge.',
    glitch:"Sorry, my connection glitched. Say that again?",
    fallbackGreet:"Hey, it's Mia. What's up?",
    greetCue:'(The call just connected. Greet me briefly as if you picked up the phone.)',
    camOn:'Camera eyes on — ask Mia what she sees.', camOff:'Camera eyes off.',
    camFail:'Camera not available — check permission.',
    camCue:'(You are seeing through my camera right now. The attached image is your current live view — refer to it naturally when relevant.)',
    attachCue:'(I attached a file to this message: NAME. Its content is included — refer to it when relevant.)',
    attached:'Attached — ask Mia about it.', tooBig:'File too large (max 10 MB).',
    unsupported:'Unsupported file type. Use images, PDF or text files.',
    madeFile:"Done — here's your file.", madeImage:'Done — your image is coming up.',
    imgFail:'Image generation failed.',
    suTitle:"Connect Mia's brain & voice",
    suDesc:'Paste your two free API keys. They are saved only in this browser (localStorage) and sent only to Google and ElevenLabs.<br><br>• Gemini key: <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">aistudio.google.com/apikey</a><br>• ElevenLabs key: <a href="https://elevenlabs.io" target="_blank" rel="noopener">elevenlabs.io</a> → profile → API Keys',
    suLang:'Language', suSave:'Save & continue', suBoth:'Both keys are required.',
    suLog:'Conversation log', suClear:'Clear log & memory', suEmpty:'(empty)',
    lYou:'You', lMia:'Mia', lMade:'Mia made: ', lAtt:'You attached: ',
    speakRule:' Always answer in English.'
  },
  sv: {
    sub:'röstsamtal', hintIdle:'Tryck för att ringa Mia. Använd Chrome eller Edge med mikrofon.',
    hintOn:'Säg hej — Mia lyssnar.', listening:'Lyssnar…', thinking:'Tänker…',
    speaking:'Mia pratar', connecting:'Ansluter…', ended:'Samtalet avslutat',
    micBlocked:'Mikrofonen är blockerad — tillåt mikrofonåtkomst och försök igen.',
    noSR:'Taligenkänning stöds inte i den här webbläsaren. Använd Chrome eller Edge.',
    glitch:'Förlåt, min anslutning strulade. Kan du säga det igen?',
    fallbackGreet:'Hej, det är Mia. Läget?',
    greetCue:'(Samtalet kopplades precis. Hälsa kort som om du svarade i telefon.)',
    camOn:'Kameraögon på — fråga Mia vad hon ser.', camOff:'Kameraögon av.',
    camFail:'Kameran är inte tillgänglig — kontrollera behörigheten.',
    camCue:'(Du ser genom min kamera just nu. Bilden som bifogas är din aktuella vy — hänvisa till den naturligt när det passar.)',
    attachCue:'(Jag bifogade en fil till detta meddelande: NAME. Innehållet är inkluderat — hänvisa till det när det passar.)',
    attached:'Bifogad — fråga Mia om den.', tooBig:'Filen är för stor (max 10 MB).',
    unsupported:'Filtypen stöds inte. Använd bilder, PDF eller textfiler.',
    madeFile:'Klart — här är din fil.', madeImage:'Klart — din bild kommer strax.',
    imgFail:'Bildgenereringen misslyckades.',
    suTitle:'Anslut Mias hjärna & röst',
    suDesc:'Klistra in dina två gratis API-nycklar. De sparas bara i den här webbläsaren (localStorage) och skickas bara till Google och ElevenLabs.<br><br>• Gemini-nyckel: <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">aistudio.google.com/apikey</a><br>• ElevenLabs-nyckel: <a href="https://elevenlabs.io" target="_blank" rel="noopener">elevenlabs.io</a> → profil → API Keys',
    suLang:'Språk', suSave:'Spara & fortsätt', suBoth:'Båda nycklarna krävs.',
    suLog:'Konversationslogg', suClear:'Rensa logg & minne', suEmpty:'(tom)',
    lYou:'Du', lMia:'Mia', lMade:'Mia skapade: ', lAtt:'Du bifogade: ',
    speakRule:' Svara alltid på svenska.'
  }
};
const T = () => I18N[LANG];
const SEARCH_ON = true;   // Google Search grounding, with automatic fallback
const SEARCH_RULE = " You can search the web. To search, reply with ONLY a marker like [[SEARCH: your search words]] and nothing else — you will immediately be given the results and can then answer. Use it whenever a question involves current events, news, prices, dates, results, or anything that may have changed recently. Never claim you looked something up unless you actually received search results. Never guess today's date from memory. Keep answers short and spoken-friendly.";
const dateLine = () => {
  const d = new Date();
  return " The current date and time right now is " + d.toLocaleString('en-GB', { weekday:'long', year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' }) +
         ". Your training data is older than this, so treat anything after your training as unknown unless you search. Trust this date over your own assumptions.";
};
const SYSTEM_PROMPT = () => SYSTEM_PROMPT_BASE + GEN_RULES + SEARCH_RULE + dateLine() + T().speakRule;
function applyLang(){
  document.querySelector('header .sub').textContent = T().sub;
  document.getElementById('chatInput').placeholder = LANG === 'sv' ? 'Skriv till Mia…' : 'Write to Mia…';
  document.getElementById('suTitle').textContent = T().suTitle;
  document.getElementById('suDesc').innerHTML = T().suDesc;
  document.getElementById('suLang').textContent = T().suLang;
  document.getElementById('saveKeys').textContent = T().suSave;
  document.getElementById('suLog').textContent = T().suLog;
  document.getElementById('clearLog').textContent = T().suClear;
  if (!onCall) hintEl.textContent = T().hintIdle;
}

/* Gemini models tried in order. "-latest" aliases always point to a live model. */
const GEMINI_MODELS = ['gemini-flash-latest', 'gemini-2.5-flash', 'gemini-flash-lite-latest', 'gemini-2.5-flash-lite'];
let geminiModel = localStorage.getItem('mia_gem_model') || null;
if (geminiModel && !GEMINI_MODELS.includes(geminiModel)) geminiModel = null;   // stale cache from old version

/* ElevenLabs — voice is auto-discovered from the user's own account,
   because free-tier keys can't use shared library voices via API. */
let EL_VOICE_ID = localStorage.getItem('mia_el_voice') || null;   // manual override
const EL_MODEL  = 'eleven_flash_v2_5';   // ~75ms latency
let elTriedVoices = [];

async function resolveVoice(){
  if (EL_VOICE_ID && !elTriedVoices.includes(EL_VOICE_ID)) return EL_VOICE_ID;
  const res = await fetch('https://api.elevenlabs.io/v1/voices', {
    headers:{ 'xi-api-key': EL_KEY }
  });
  if (!res.ok) throw new Error('ElevenLabs voices ' + res.status);
  const voices = (await res.json())?.voices || [];
  const usable = voices.filter(v => !elTriedVoices.includes(v.voice_id));
  if (!usable.length) throw new Error('No usable ElevenLabs voices on this account');
  // Prefer a premade female voice for Mia; otherwise take what's available.
  const pick =
    usable.find(v => v.category === 'premade' && /female/i.test(v.labels?.gender || '')) ||
    usable.find(v => /female/i.test(v.labels?.gender || '')) ||
    usable.find(v => v.category === 'premade') ||
    usable[0];
  EL_VOICE_ID = pick.voice_id;
  localStorage.setItem('mia_el_voice', EL_VOICE_ID);
  return EL_VOICE_ID;
}

/* ---------------- persistence: memory, log, blobs ---------------- */
const idb = {
  db: null,
  open(){
    if (this.db) return Promise.resolve();
    return new Promise((res, rej) => {
      const r = indexedDB.open('mia', 1);
      r.onupgradeneeded = () => r.result.createObjectStore('blobs');
      r.onsuccess = () => { this.db = r.result; res(); };
      r.onerror = () => rej(r.error);
    });
  },
  async put(key, blob){
    await this.open();
    return new Promise((res, rej) => {
      const tx = this.db.transaction('blobs', 'readwrite');
      tx.objectStore('blobs').put(blob, key);
      tx.oncomplete = res; tx.onerror = () => rej(tx.error);
    });
  },
  async get(key){
    await this.open();
    return new Promise((res, rej) => {
      const q = this.db.transaction('blobs').objectStore('blobs').get(key);
      q.onsuccess = () => res(q.result || null);
      q.onerror = () => rej(q.error);
    });
  },
  async clear(){
    await this.open();
    return new Promise((res) => {
      const tx = this.db.transaction('blobs', 'readwrite');
      tx.objectStore('blobs').clear();
      tx.oncomplete = res; tx.onerror = res;
    });
  }
};

/* ---------------- robot face (canvas) ---------------- */
const face = (() => {
  const cv = document.getElementById('face');
  const cx = cv.getContext('2d');
  const W = cv.width, H = cv.height, CX = W/2, CY = H/2;

  const cur = { eyeH:1, browTilt:0, browRaise:0, pupilX:0, pupilY:0,
                mouthOpen:.08, mouthCurve:.25, headBob:0, glow:.6 };
  const tgt = Object.assign({}, cur);
  let expression = 'idle';
  let blinkT = 0, nextBlink = 2 + Math.random()*3;
  let wanderT = 0, t = 0;
  let mouthLevel = 0;

  function setExpression(e){
    expression = e;
    switch(e){
      case 'idle':      Object.assign(tgt,{eyeH:1, browTilt:0,  browRaise:0,  mouthOpen:.07, mouthCurve:.5,  glow:.7}); break;
      case 'listening': Object.assign(tgt,{eyeH:1.12,browTilt:0, browRaise:.5, mouthOpen:.05, mouthCurve:.55, glow:1}); break;
      case 'thinking':  Object.assign(tgt,{eyeH:.78,browTilt:.5, browRaise:.3, mouthOpen:.04, mouthCurve:.3,  pupilX:.5, pupilY:-.6, glow:.8}); break;
      case 'speaking':  Object.assign(tgt,{eyeH:1, browTilt:0,  browRaise:.2, mouthCurve:.45, glow:1}); break;
      case 'happy':     Object.assign(tgt,{eyeH:.5, browTilt:-.25,browRaise:.6,mouthCurve:1,   glow:1.15}); break;
      case 'surprised': Object.assign(tgt,{eyeH:1.3,browTilt:0,  browRaise:1,  mouthOpen:.5,  mouthCurve:.25, glow:1.1}); break;
    }
  }
  function setMouthLevel(v){ mouthLevel = v; }

  function ease(dt){
    for (const k in tgt) cur[k] += (tgt[k]-cur[k]) * Math.min(1, dt*7);
  }

  function draw(dt){
    t += dt;
    blinkT += dt;
    let blink = 1;
    if (blinkT > nextBlink){
      const p = (blinkT - nextBlink) / .22;
      if (p >= 1){ blinkT = 0; nextBlink = 1.8 + Math.random()*3.5; }
      else blink = Math.abs(1 - p*2);
    }
    if (expression === 'idle' || expression === 'listening'){
      wanderT += dt;
      if (wanderT > 2.4){ wanderT = 0; tgt.pupilX = (Math.random()*2-1)*.5; tgt.pupilY = (Math.random()*2-1)*.3; }
    }
    if (expression === 'speaking'){ tgt.pupilX = Math.sin(t*.6)*.15; tgt.pupilY = 0; }
    if (mouthLevel > 0.01) tgt.mouthOpen = .06 + mouthLevel*.85;
    tgt.headBob = Math.sin(t*1.2)*(expression==='speaking'? 6:3);
    ease(dt);

    cx.clearRect(0,0,W,H);
    cx.save();
    cx.translate(CX, CY + cur.headBob);

    const r = 210;
    const grad = cx.createLinearGradient(0,-r,0,r);
    grad.addColorStop(0,'#26325a'); grad.addColorStop(1,'#161e36');
    cx.fillStyle = grad;
    roundRect(-r, -r*.92, r*2, r*1.84, 118); cx.fill();
    cx.lineWidth = 5; cx.strokeStyle = '#2f3d63'; cx.stroke();

    cx.strokeStyle = '#2b3757'; cx.lineWidth = 8;
    cx.beginPath(); cx.moveTo(0,-r*.92); cx.lineTo(0,-r*1.12); cx.stroke();
    cx.fillStyle = `rgba(125,227,255,${.4 + .6*cur.glow*(0.6+0.4*Math.sin(t*3))})`;
    cx.beginPath(); cx.arc(0,-r*1.2, 13, 0, 7); cx.fill();

    cx.fillStyle = '#2b3757';
    roundRect(-r-16, -34, 20, 68, 10); cx.fill();
    roundRect( r-4,  -34, 20, 68, 10); cx.fill();

    cx.fillStyle = '#0c1226';
    roundRect(-r*.8, -r*.68, r*1.6, r*1.36, 84); cx.fill();

    const eyeY = -42, eyeDX = 80;
    const eh = 54 * cur.eyeH * blink, ew = 40;
    for (const s of [-1,1]){
      const ex = s*eyeDX + cur.pupilX*14;
      const g = cx.createRadialGradient(ex, eyeY, 4, ex, eyeY, 58);
      g.addColorStop(0, `rgba(125,227,255,${.5*cur.glow})`);
      g.addColorStop(1, 'rgba(125,227,255,0)');
      cx.fillStyle = g;
      cx.beginPath(); cx.arc(ex, eyeY, 60, 0, 7); cx.fill();

      const eg = cx.createLinearGradient(ex, eyeY-eh, ex, eyeY+eh);
      eg.addColorStop(0,'#a5efff'); eg.addColorStop(1,'#5ed4f8');
      cx.fillStyle = eg;
      cx.beginPath();
      cx.ellipse(ex, eyeY + cur.pupilY*8, ew, Math.max(3, eh), 0, 0, 7);
      cx.fill();
      // big + small highlight = softer, friendlier look
      cx.fillStyle = 'rgba(255,255,255,.9)';
      cx.beginPath();
      cx.ellipse(ex - 11 + cur.pupilX*6, eyeY - eh*.35 + cur.pupilY*8, 10, Math.max(2, eh*.24), 0, 0, 7);
      cx.fill();
      cx.fillStyle = 'rgba(255,255,255,.55)';
      cx.beginPath();
      cx.ellipse(ex + 12 + cur.pupilX*6, eyeY + eh*.3 + cur.pupilY*8, 5, Math.max(1.5, eh*.1), 0, 0, 7);
      cx.fill();
    }

    // gently arched brows
    cx.strokeStyle = `rgba(125,227,255,${.7*cur.glow})`;
    cx.lineWidth = 7; cx.lineCap = 'round';
    for (const s of [-1,1]){
      const bx = s*eyeDX, by = eyeY - 66 - cur.browRaise*16;
      const tilt = cur.browTilt * 12 * s;
      cx.beginPath();
      cx.moveTo(bx - 28, by + 6 + tilt);
      cx.quadraticCurveTo(bx, by - 8, bx + 28, by + 6 - tilt);
      cx.stroke();
    }

    const my = 84, mw = 96;
    const open = Math.max(.03, cur.mouthOpen);
    const curve = cur.mouthCurve;
    cx.fillStyle = '#7de3ff';
    cx.beginPath();
    cx.moveTo(-mw/2, my - curve*18);
    cx.quadraticCurveTo(0, my - curve*18 - open*8, mw/2, my - curve*18);
    cx.quadraticCurveTo(mw/2 + open*6, my + open*46*.5, mw/2, my + open*46 + curve*14);
    cx.quadraticCurveTo(0, my + open*46 + curve*30, -mw/2, my + open*46 + curve*14);
    cx.quadraticCurveTo(-mw/2 - open*6, my + open*46*.5, -mw/2, my - curve*18);
    cx.closePath();
    cx.fill();
    if (open > .18){
      cx.fillStyle = '#0c1226';
      cx.beginPath();
      cx.ellipse(0, my + open*24, mw*.32, open*18, 0, 0, 7);
      cx.fill();
    }

    if (curve > .3){
      const blush = Math.min(1, (curve - .3) / .6);
      cx.fillStyle = `rgba(244,138,158,${.12 + .28*blush})`;
      cx.beginPath(); cx.ellipse(-eyeDX-16, 36, 24, 13, 0, 0, 7); cx.fill();
      cx.beginPath(); cx.ellipse( eyeDX+16, 36, 24, 13, 0, 0, 7); cx.fill();
    }

    cx.restore();
  }

  function roundRect(x,y,w,h,rad){
    cx.beginPath();
    cx.moveTo(x+rad,y);
    cx.arcTo(x+w,y,x+w,y+h,rad);
    cx.arcTo(x+w,y+h,x,y+h,rad);
    cx.arcTo(x,y+h,x,y,rad);
    cx.arcTo(x,y,x+w,y,rad);
    cx.closePath();
  }

  let last = performance.now();
  (function loop(now){
    const dt = Math.min(.05, (now-last)/1000); last = now;
    draw(dt);
    requestAnimationFrame(loop);
  })(last);

  setExpression('idle');
  return { setExpression, setMouthLevel };
})();

/* ---------------- lip sync ---------------- */
function startLipSyncFromAnalyser(){
  function tick(){
    if (state !== S.SPEAKING) { face.setMouthLevel(0); return; }
    let level = 0;
    if (analyser && ampData){
      analyser.getByteTimeDomainData(ampData);
      let sum = 0;
      for (let i=0;i<ampData.length;i++){ const d = (ampData[i]-128)/128; sum += d*d; }
      level = Math.min(1, Math.sqrt(sum/ampData.length) * 5.5);
    } else {
      fakeMouthTimer += .08;
      level = Math.max(0, Math.sin(fakeMouthTimer*7)*.5 + .35 + Math.sin(fakeMouthTimer*13)*.2);
    }
    face.setMouthLevel(level);
    requestAnimationFrame(tick);
  }
  tick();
}

const attachArea = document.getElementById('attachArea');
const attachBtn  = document.getElementById('attachBtn');
const fileInput  = document.getElementById('fileInput');
let attachment = null;   // {kind:'image'|'pdf', mime, dataB64, name} | {kind:'text', text, name}

attachBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', async () => {
  const f = fileInput.files[0];
  fileInput.value = '';
  if (!f) return;
  if (f.size > 10*1024*1024){ hintEl.textContent = T().tooBig; return; }
  try {
    if (f.type.startsWith('image/')){
      attachment = { kind:'image', mime:'image/jpeg', dataB64: await imageToB64(f), name:f.name, file:f };
      addAttachmentCard(f.name, URL.createObjectURL(f));
    } else if (f.type === 'application/pdf' || /\.pdf$/i.test(f.name)){
      attachment = { kind:'pdf', mime:'application/pdf', dataB64: await fileToB64(f), name:f.name, file:f };
      addAttachmentCard(f.name, null);
    } else if (f.type.startsWith('text/') || /\.(txt|md|csv|json|html)$/i.test(f.name)){
      let text = await f.text();
      if (text.length > 100000) text = text.slice(0, 100000);
      attachment = { kind:'text', text, name:f.name, file:f };
      addAttachmentCard(f.name, null);
    } else {
      hintEl.textContent = T().unsupported; return;
    }
    logAttach(attachment.kind === 'image' ? 'image' : 'file', f.name, f);
    hintEl.textContent = T().attached;
  } catch(e){ hintEl.textContent = '⚠ ' + e.message; }
});

function fileToB64(f){
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('read failed'));
    r.readAsDataURL(f);
  });
}
function imageToB64(f){
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => {
      const maxSide = 1024;
      const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
      const c = document.createElement('canvas');
      c.width = Math.round(img.width*scale); c.height = Math.round(img.height*scale);
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      URL.revokeObjectURL(img.src);
      res(c.toDataURL('image/jpeg', .85).split(',')[1]);
    };
    img.onerror = () => rej(new Error('image read failed'));
    img.src = URL.createObjectURL(f);
  });
}

/* parse [[FILE:...]]...[[/FILE]] and [[IMAGE:...]] out of Mia's reply */
function processReply(reply, container){
  let spoken = reply;
  spoken = spoken.replace(/\[\[SEARCH:[^\]]*\]\]/ig, ' ');   // never show/speak a search marker
  const files = [];
  spoken = spoken.replace(/\[\[FILE:([^\]]+)\]\]([\s\S]*?)\[\[\/FILE\]\]/g, (m, fname, content) => {
    files.push({ name: fname.trim(), content: content.trim() });
    return ' ';
  });
  let imagePrompt = null;
  spoken = spoken.replace(/\[\[IMAGE:([^\]]*)\]\]/g, (m, desc) => {
    imagePrompt = desc.trim();
    return ' ';
  });
  spoken = spoken.replace(/\s+/g, ' ').trim();

  for (const f of files){
    const mime = /\.html?$/i.test(f.name) ? 'text/html' :
                 /\.csv$/i.test(f.name)  ? 'text/csv'  :
                 /\.md$/i.test(f.name)   ? 'text/markdown' : 'text/plain';
    addResultCard({ name: f.name, blob: new Blob([f.content], { type: mime }), kind:'file' }, container);
  }
  if (imagePrompt) generateImage(imagePrompt, container);   // async, card appears when done

  if (!spoken) spoken = files.length ? T().madeFile : (imagePrompt ? T().madeImage : '');
  return spoken || T().madeFile;
}

/* ---------------- image generation ---------------- */
async function generateImage(prompt, container){
  const pending = addResultCard({ name: 'image…', pending: true }, container);
  try {
    let blob = null;
    // 1) Gemini image model (free tier includes a small daily quota)
    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image:generateContent?key=${encodeURIComponent(GEMINI_KEY)}`,
        {
          method:'POST',
          headers:{ 'Content-Type':'application/json' },
          body: JSON.stringify({
            contents:[{ parts:[{ text: 'Generate an image: ' + prompt }] }],
            generationConfig:{ responseModalities:['TEXT','IMAGE'] }
          })
        });
      if (res.ok){
        const data = await res.json();
        const part = (data?.candidates?.[0]?.content?.parts || []).find(p => p.inline_data || p.inlineData);
        const inl = part && (part.inline_data || part.inlineData);
        if (inl){
          const bytes = Uint8Array.from(atob(inl.data), c => c.charCodeAt(0));
          blob = new Blob([bytes], { type: inl.mime_type || inl.mimeType || 'image/png' });
        }
      }
    } catch(e){ /* fall through to pollinations */ }
    // 2) Pollinations fallback (free, keyless)
    if (!blob){
      const res = await fetch('https://image.pollinations.ai/prompt/' + encodeURIComponent(prompt) + '?width=768&height=768&nologo=true');
      if (!res.ok) throw new Error('image HTTP ' + res.status);
      blob = await res.blob();
    }
    pending.remove();
    const thumbURL = URL.createObjectURL(blob);
    addResultCard({ name: 'mia-image-' + Date.now() + '.png', blob, thumbURL, kind:'image' }, container);
  } catch(e){
    pending.remove(); refreshAttachBtnVisibility();
    hintEl.textContent = '⚠ ' + T().imgFail + ' ' + (e.message || '');
  }
}

/* ---------------- camera "eyes" ---------------- */
const camVideo = document.getElementById('camVideo');
let camStream = null;
let camFacing = 'environment';

async function startCamera(){
  stopCamera();
  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: camFacing, width: { ideal: 1024 } },
      audio: false
    });
    camVideo.srcObject = camStream;
    document.body.classList.add('camon');
    hintEl.textContent = T().camOn;
  } catch(e){
    camStream = null;
    document.body.classList.remove('camon');
    hintEl.textContent = T().camFail;
  }
}

function stopCamera(){
  if (camStream){ camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  camVideo.srcObject = null;
  document.body.classList.remove('camon');
}

function captureFrame(){
  if (!camStream || !camVideo.videoWidth) return null;
  const maxSide = 768;
  const scale = Math.min(1, maxSide / Math.max(camVideo.videoWidth, camVideo.videoHeight));
  const c = document.createElement('canvas');
  c.width = Math.round(camVideo.videoWidth * scale);
  c.height = Math.round(camVideo.videoHeight * scale);
  c.getContext('2d').drawImage(camVideo, 0, 0, c.width, c.height);
  return c.toDataURL('image/jpeg', 0.8).split(',')[1];   // raw base64
}

document.getElementById('camBtn').addEventListener('click', () => {
  if (camStream){ stopCamera(); hintEl.textContent = T().camOff; }
  else startCamera();
});
document.getElementById('camFlip').addEventListener('click', (e) => {
  e.stopPropagation();
  camFacing = camFacing === 'environment' ? 'user' : 'environment';
  if (camStream) startCamera();
});

/* ---------------- speech recognition ---------------- */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

function startListening(){
  if (!onCall) return;
  setState(S.LISTENING, T().listening);
  try { recog && recog.abort(); } catch(e){}
  recog = new SR();
  recog.lang = LANG === 'sv' ? 'sv-SE' : 'en-US';
  // continuous = true keeps the mic session open for your whole turn,
  // so Android's recognition chime plays once per turn instead of on
  // every silence-restart.
  recog.continuous = true;
  recog.interimResults = false;
  recog.maxAlternatives = 1;

  let got = false;
  recog.onresult = (ev) => {
    if (got || state !== S.LISTENING) return;
    const last = ev.results[ev.results.length - 1];
    if (!last.isFinal) return;
    const text = last[0].transcript.trim();
    if (!text) return;
    got = true;
    handleUserSpeech(text);
  };
  recog.onerror = (ev) => {
    if (!onCall) return;
    if (ev.error === 'not-allowed' || ev.error === 'service-not-allowed'){
      endCall(T().micBlocked);
      return;
    }
    if (state === S.LISTENING) setTimeout(() => { if (onCall && state === S.LISTENING) startListening(); }, 400);
  };
  recog.onend = () => {
    if (onCall && !got && state === S.LISTENING){
      setTimeout(() => { if (onCall && state === S.LISTENING) startListening(); }, 300);
    }
  };
  try { recog.start(); } catch(e){ /* already started */ }
}

function stopListening(){
  if (recog){ try{ recog.onend = null; recog.abort(); }catch(e){} recog = null; }
}

/* ---------------- LLM: Gemini ---------------- */
async function geminiRequest(model, contents, disableThinking, useSearch){
  const generationConfig = { temperature: 1.0, maxOutputTokens: 1024 };
  if (disableThinking) generationConfig.thinkingConfig = { thinkingBudget: 0 };
  const payload = {
    system_instruction: { parts: [{ text: SYSTEM_PROMPT() }] },
    contents,
    generationConfig
  };
  if (useSearch) payload.tools = [{ google_search: {} }];
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(GEMINI_KEY)}`,
    {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify(payload)
    }
  );
  if (!res.ok){
    let detail = '';
    try { detail = (await res.json())?.error?.message || ''; } catch(e){}
    const err = new Error(`Gemini ${res.status}${detail ? ': ' + detail.slice(0,140) : ''}`);
    err.status = res.status;
    throw err;
  }
  const data = await res.json();
  lastGrounded = !!data?.candidates?.[0]?.groundingMetadata;
  // Ignore internal "thought" parts; keep only real text.
  const text = (data?.candidates?.[0]?.content?.parts || [])
    .filter(p => !p.thought && p.text)
    .map(p => p.text).join('').trim();
  if (!text){
    const reason = data?.candidates?.[0]?.finishReason || 'no text';
    throw new Error('Gemini empty reply (' + reason + ')');
  }
  return text;
}

let lastGrounded = false;   // true when the answer actually used Google Search
let lastSearchError = '';   // why native grounding failed, for diagnostics

/* Free, keyless, CORS-friendly web search used when Gemini's own
   Google Search grounding isn't available for this key. */
async function webSearch(query){
  const target = 'https://duckduckgo.com/html/?q=' + encodeURIComponent(query);
  const res = await fetch('https://r.jina.ai/' + target, { headers:{ 'Accept':'text/plain' } });
  if (!res.ok) throw new Error('search HTTP ' + res.status);
  let text = await res.text();
  text = text.replace(/\n{3,}/g, '\n\n').trim();
  return text.slice(0, 6000);
}

async function tryModel(model, contents){
  // Optional Google Search grounding. Gemini 2.5 often rejects the search tool
  // when thinking is disabled, so if the fast variant fails we try once more
  // with thinking enabled before falling back to a plain (unsearched) request.
  if (SEARCH_ON){
    try {
      return await geminiRequest(model, contents, true, true);
    } catch(e){
      console.warn('search (fast) failed:', e.status, e.message);
      if (e.status === 401 || e.status === 403) throw e;
      try {
        return await geminiRequest(model, contents, false, true);
      } catch(e2){
        console.warn('search (thinking) failed:', e2.status, e2.message);
        if (e2.status === 401 || e2.status === 403) throw e2;
        lastSearchError = e2.message || e.message || '';
      }
    }
  }
  // First try with thinking disabled (fastest). If the model rejects
  // thinkingConfig (400), retry once without it.
  try {
    return await geminiRequest(model, contents, true, false);
  } catch(e){
    if (e.status === 400) return await geminiRequest(model, contents, false, false);
    throw e;
  }
}

async function askMia(userText, imageB64){
  const reply = await askMiaOnce(userText, imageB64);
  // Did Mia ask to search? Run it for real and let her answer from the results.
  const m = reply.match(/\[\[SEARCH:([^\]]*)\]\]/i);
  if (!m) return reply;
  const query = m[1].trim();
  if (!query) return reply.replace(/\[\[SEARCH:[^\]]*\]\]/ig, '').trim();
  try {
    const results = await webSearch(query);
    // remove the marker turn from memory so it doesn't confuse later turns
    if (history.length && history[history.length-1].role === 'model') history.pop();
    const idx = history.length;
    const answer = await askMiaOnce(
      '(Web search results for "' + query + '":\n' + results +
      '\nAnswer my previous question using these results. Be brief and spoken-friendly. Do not use the search marker again.)'
    );
    // drop the bulky results turn from memory, keep only Mia's answer
    history.splice(idx, 1);
    saveHistory();
    lastGrounded = true;
    return answer;
  } catch(e){
    console.warn('web search failed:', e.message);
    if (history.length && history[history.length-1].role === 'model') history.pop();
    const idx = history.length;
    const answer = await askMiaOnce('(The web search failed. Tell me briefly that you could not check right now, and do not use the search marker again.)');
    history.splice(idx, 1);
    saveHistory();
    return answer;
  }
}

async function askMiaOnce(userText, imageB64){
  // History stores text only (images are heavy); the live frame is
  // attached just to the outgoing request for the current turn.
  history.push({ role:'user', parts:[{ text:userText }] });
  if (history.length > 40) history = history.slice(-40);
  saveHistory();

  let contents = history;
  if (imageB64 || attachment){
    const parts = [];
    let cue = '';
    if (imageB64) cue += T().camCue + ' ';
    if (attachment) cue += T().attachCue.replace('NAME', attachment.name) + ' ';
    parts.push({ text: cue + userText });
    if (imageB64) parts.push({ inline_data: { mime_type:'image/jpeg', data: imageB64 } });
    if (attachment){
      if (attachment.kind === 'text')
        parts.push({ text: '\n--- ' + attachment.name + ' ---\n' + attachment.text + '\n--- end of file ---' });
      else
        parts.push({ inline_data: { mime_type: attachment.mime, data: attachment.dataB64 } });
    }
    contents = history.slice(0, -1).concat([{ role:'user', parts }]);
  }

  const models = geminiModel ? [geminiModel, ...GEMINI_MODELS.filter(m => m !== geminiModel)] : GEMINI_MODELS;
  let lastErr = null;
  for (const m of models){
    try {
      const reply = await tryModel(m, contents);
      if (m !== geminiModel){ geminiModel = m; localStorage.setItem('mia_gem_model', m); }
      history.push({ role:'model', parts:[{ text:reply }] });
      saveHistory();
      return reply;
    } catch(e){
      lastErr = e;
      console.warn('Gemini model failed:', m, e.message);
      if (e.status === 401 || e.status === 403){ throw Object.assign(e, { badKey:'gemini' }); }
      // 404 / 429 / empty → try next model
    }
  }
  throw lastErr || new Error('Gemini failed');
}

function inferExpression(text){
  const t = text.toLowerCase();
  if (/\bhaha|\blol|😄|😂|great|love|awesome|amazing/.test(t)) return 'happy';
  if (/\bwow|really\?|no way|seriously\?|what\?!/.test(t)) return 'surprised';
  if (text.includes('!')) return 'happy';
  return 'speaking';
}

/* ---------------- TTS: ElevenLabs ---------------- */
async function elTTS(text){
  const voice = await resolveVoice();
  const body = {
    text,
    model_id: EL_MODEL,
    voice_settings: { stability: 0.45, similarity_boost: 0.8 }
  };
  if (LANG === 'sv') body.language_code = 'sv';   // Flash v2.5 supports language enforcement
  const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voice}?output_format=mp3_44100_128`, {
    method:'POST',
    headers:{ 'xi-api-key': EL_KEY, 'Content-Type':'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok){
    const err = new Error('TTS HTTP ' + res.status);
    err.status = res.status; err.voice = voice;
    try { err.detail = JSON.stringify((await res.json())?.detail || '').slice(0,120); } catch(e){}
    throw err;
  }
  return await res.blob();
}

async function speak(text){
  setState(S.SPEAKING, T().speaking);
  const expr = inferExpression(text);
  try {
    let blob;
    try {
      blob = await elTTS(text);
    } catch(e){
      if (e.status === 401){ badKeyStop('elevenlabs'); return; }
      if (e.status === 402 || e.status === 403){
        // this voice isn't allowed on this plan — blacklist it and try another
        elTriedVoices.push(e.voice);
        localStorage.removeItem('mia_el_voice'); EL_VOICE_ID = null;
        blob = await elTTS(text);            // second attempt with a fresh voice
      } else throw e;
    }
    await playBlob(blob, expr);
  } catch(e){
    hintEl.textContent = '⚠ ElevenLabs: ' + (e.detail || e.message) + ' — using fallback voice';
    await speakFallback(text, expr);
  }
  if (onCall) startListening();
}

function playBlob(blob, expr){
  return new Promise((resolve) => {
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentAudio = audio;
    try {
      if (audioCtx){
        const src = audioCtx.createMediaElementSource(audio);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 512;
        ampData = new Uint8Array(analyser.fftSize);
        src.connect(analyser); analyser.connect(audioCtx.destination);
      }
    } catch(e){ analyser = null; }
    audio.onplay = () => {
      face.setExpression(expr);
      if (expr !== 'speaking') setTimeout(() => { if (state === S.SPEAKING) face.setExpression('speaking'); }, 1100);
      startLipSyncFromAnalyser();
    };
    audio.onended = () => { URL.revokeObjectURL(url); currentAudio = null; face.setMouthLevel(0); resolve(); };
    audio.onerror  = () => { URL.revokeObjectURL(url); currentAudio = null; resolve(); };
    audio.play().catch(() => resolve());
  });
}

function speakFallback(text, expr){
  return new Promise((resolve) => {
    if (!('speechSynthesis' in window)) return resolve();
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = LANG === 'sv' ? 'sv-SE' : 'en-US';
    const voices = speechSynthesis.getVoices();
    const v = LANG === 'sv'
      ? voices.find(v => v.lang && v.lang.toLowerCase().startsWith('sv'))
      : voices.find(v => /female|samantha|zira|google (us|uk) english/i.test(v.name));
    if (v) u.voice = v;
    u.rate = 1.02; u.pitch = 1.1;
    analyser = null;
    u.onstart = () => { face.setExpression('speaking'); startLipSyncFromAnalyser(); };
    u.onend = () => { face.setMouthLevel(0); resolve(); };
    u.onerror = () => resolve();
    speechSynthesis.speak(u);
  });
}

/* ---------------- text chat ---------------- */
const chatEl    = document.getElementById('chat');
const chatMsgs  = document.getElementById('chatMsgs');
const chatInput = document.getElementById('chatInput');
let chatOpen = false;
let chatBusy = false;

function scrollChat(){ chatMsgs.scrollTop = chatMsgs.scrollHeight; }
function addBubble(role, text){
  const b = document.createElement('div');
  b.className = 'bub ' + role;
  b.textContent = text;
  chatMsgs.appendChild(b);
  scrollChat();
  return b;
}
function chatCardHolder(){
  const w = document.createElement('div');
  w.className = 'bubcards';
  chatMsgs.appendChild(w);
  return w;
}

function addSavedCard(entry){
  // rebuild a file/image card from the persistent log (blob in IndexedDB)
  const holder = document.createElement('div');
  holder.className = 'bubcards' + (entry.t === 'att' ? ' user' : '');
  const card = document.createElement('div');
  card.className = 'fcard';
  card.innerHTML =
    (entry.kind === 'image' ? `<img alt="">` : '') +
    `<div><div class="fname"></div>` + (entry.t === 'att' ? `<div class="fsub">📎</div>` : '') + `</div>
     <a class="dl" href="#" download>⬇</a>`;
  card.querySelector('.fname').textContent = entry.name;
  if (entry.kind === 'image'){
    const img = card.querySelector('img');
    idb.get(entry.blobId).then(b => {
      if (b){ img.src = URL.createObjectURL(b); img.onload = scrollChat; }
      else img.remove();
    });
  }
  card.querySelector('a.dl').addEventListener('click', async (ev) => {
    ev.preventDefault();
    const b = await idb.get(entry.blobId);
    if (!b) return;
    const url = URL.createObjectURL(b);
    const tmp = document.createElement('a');
    tmp.href = url; tmp.download = entry.name; tmp.click();
    setTimeout(() => URL.revokeObjectURL(url), 3000);
  });
  holder.appendChild(card);
  chatMsgs.appendChild(holder);
}

function toggleChat(){
  if (onCall) return;                      // chat only when not calling
  chatOpen = !chatOpen;
  chatEl.classList.toggle('hidden', !chatOpen);
  document.body.classList.toggle('chatmode', chatOpen);
  if (chatOpen){
    {
      // always rebuild from the persistent log so anything said during a
      // voice call (and its 🔎 marker) also shows up here
      chatMsgs.innerHTML = '';
      for (const e of convLog.slice(-100)){
        if (e.t === 'msg'){
          addBubble(e.role === 'user' ? 'user' : 'mia', e.text);
          if (e.searched){
            const badge = document.createElement('div');
            badge.className = 'bub mia typing';
            badge.textContent = '🔎 Google';
            chatMsgs.appendChild(badge);
          }
        }
        else addSavedCard(e);
      }
    }
    chatInput.focus();
    scrollChat();
  } else {
    attachment = null;
    clearAttachmentCard();
  }
}
document.getElementById('chatBtn').addEventListener('click', toggleChat);
document.getElementById('chatAttachBtn').addEventListener('click', () => fileInput.click());

async function sendChat(){
  const text = chatInput.value.trim();
  if (!text || chatBusy) return;
  if (!GEMINI_KEY){ showSetup(); return; }
  chatInput.value = '';
  chatBusy = true;
  if (attachment && attachment.file){
    // keep the attachment visible in the chat with a working download link
    const holder = document.createElement('div');
    holder.className = 'bubcards user';
    const url = URL.createObjectURL(attachment.file);
    const card = document.createElement('div');
    card.className = 'fcard';
    card.innerHTML =
      (attachment.kind === 'image' ? `<img src="${url}" alt="">` : '') +
      `<div><div class="fname"></div><div class="fsub">📎</div></div>
       <a class="dl" download>⬇</a>`;
    card.querySelector('.fname').textContent = attachment.name;
    const a = card.querySelector('a.dl');
    a.href = url; a.download = attachment.name;
    holder.appendChild(card);
    chatMsgs.appendChild(holder);
  }
  addBubble('user', text);
  logMsg('user', text);
  const typing = addBubble('mia typing', '…');
  try {
    const reply = await askMia(text, null);
    typing.remove();
    const holder = chatCardHolder();
    const spoken = processReply(reply, holder);
    if (!holder.children.length) holder.remove();
    if (history.length && history[history.length-1].role === 'model')
      history[history.length-1] = { role:'model', parts:[{ text: spoken }] };
    saveHistory();
    addBubble('mia', spoken);
    if (lastGrounded){
      const badge = document.createElement('div');
      badge.className = 'bub mia typing';
      badge.textContent = '🔎 Google';
      chatMsgs.appendChild(badge);
      scrollChat();
    }
    logMsg('model', spoken, lastGrounded);
    // attachment was consumed by this turn
    attachment = null; clearAttachmentCard();
  } catch(e){
    typing.remove();
    if (e.badKey === 'gemini'){ chatBusy = false; badKeyStop('gemini'); return; }
    if (history.length && history[history.length-1].role === 'user') history.pop();
    saveHistory();
    addBubble('mia', '⚠ ' + (e.message || 'Error'));
  }
  chatBusy = false;
}
document.getElementById('chatSend').addEventListener('click', sendChat);
chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendChat(); });

/* ---------------- conversation flow ---------------- */
async function handleUserSpeech(text){
  stopListening();
  setState(S.THINKING, T().thinking);
  const frame = camStream ? captureFrame() : null;
  logMsg('user', text);
  try {
    const reply = await askMia(text, frame);
    if (!onCall) return;
    const spoken = processReply(reply);
    // history should hold what was actually said, not raw markers
    if (history.length && history[history.length-1].role === 'model')
      history[history.length-1] = { role:'model', parts:[{ text: spoken }] };
    saveHistory();
    logMsg('model', spoken, lastGrounded);
    await speak(spoken);
  } catch(e){
    if (!onCall) return;
    if (e.badKey === 'gemini'){ badKeyStop('gemini'); return; }
    // drop the failed user turn so history stays clean
    if (history.length && history[history.length-1].role === 'user') history.pop();
    saveHistory();
    hintEl.textContent = '⚠ ' + (e.message || 'Unknown error');
    await speakFallback(T().glitch, 'speaking');
    if (onCall) startListening();
  }
}

function badKeyStop(which){
  endCall(which === 'gemini' ? 'Gemini key rejected — check settings.' : 'ElevenLabs key rejected — check settings.');
  showSetup();
}

/* ---------------- call control ---------------- */
async function startCall(){
  if (!SR){
    hintEl.textContent = T().noSR;
    return;
  }
  if (!GEMINI_KEY || !EL_KEY){ showSetup(); return; }
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    await audioCtx.resume();
  } catch(e){ audioCtx = null; }
  onCall = true;
  if (chatOpen) toggleChat();
  document.body.classList.add('oncall');
  callBtn.setAttribute('aria-label','End call');
  hintEl.textContent = T().hintOn;
  stopListening();
  setState(S.THINKING, T().connecting);
  try {
    const cueIdx = history.length;
    const greeting = await askMia(T().greetCue);
    history.splice(cueIdx, 1);         // drop the hidden cue, keep Mia's greeting
    saveHistory();
    logMsg('model', greeting);
    if (onCall) await speak(greeting);
  } catch(e){
    if (e.badKey === 'gemini'){ badKeyStop('gemini'); return; }
    hintEl.textContent = '⚠ ' + (e.message || 'Unknown error');
    if (onCall) { await speakFallback(T().fallbackGreet, 'happy'); }
  }
  if (onCall && state !== S.LISTENING) startListening();
}

function endCall(msg){
  onCall = false;
  stopListening();
  stopCamera();
  attachment = null;
  attachArea.innerHTML = '';
  refreshAttachBtnVisibility();
  if (currentAudio){ try{ currentAudio.pause(); }catch(e){} currentAudio = null; }
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  document.body.classList.remove('oncall');
  callBtn.setAttribute('aria-label','Start call');
  setState(S.OFF, msg || T().ended);
  hintEl.textContent = T().hintIdle;
  setTimeout(() => { if (!onCall) statusEl.textContent = '\u00a0'; }, 2500);
}

callBtn.addEventListener('click', () => { onCall ? endCall() : startCall(); });
applyLang();
